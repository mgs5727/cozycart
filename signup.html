<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CozyCart Market | User Signup</title>

  <!-- EXTERNAL CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- BOOTSTRAP CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- INTERNAL CSS -->
  <style>
    .tagline {
      font-style: italic;
      opacity: 0.9;
    }
    .signup-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 30px 0;
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="header-left">
      <img src="logo.png" alt="CozyCart Market Logo" class="logo" />
      <div>
        <h1 class="brand">CozyCart Market</h1>
        <p class="tagline">Everyday essentials, cozy prices.</p>
      </div>
    </div>

    <!-- INLINE CSS -->
    <div style="text-align:right;">
      <p style="margin:0; font-weight:600;">Call Us: (555) 123-4567</p>
      <p style="margin:0;">Open: Mon–Sat 9am–7pm</p>
    </div>
  </header>

  <!-- NAV -->
  <nav class="site-nav">
    <a class="nav-link" href="home.html">Home</a>
    <a class="nav-link" href="#">About</a>
    <a class="nav-link" href="#">Products</a>
    <a class="nav-link" href="#">Deals</a>
    <a class="nav-link" href="#">Cart</a>
    <a class="nav-link" href="#">Contact</a>
    <a class="nav-link active" href="signup.html">Sign Up</a>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container signup-container">
    <h2>User Signup</h2>

    <form class="needs-validation" novalidate>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" placeholder="Enter username" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Enter email" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter password" required />
      </div>

      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" placeholder="Confirm password" required />
      </div>

      <button type="submit" class="btn btn-primary">Create Account</button>
      <a href="home.html" class="btn btn-secondary ms-2">Back to Home</a>
    </form>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>&copy; 2026 CozyCart Market. All Rights Reserved.</p>
    <div class="footer-links">
      <a href="#">Terms of Use</a>
      <a href="#">Cookie & Privacy Policy</a>
      <a href="#">Support</a>
    </div>
  </footer>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
