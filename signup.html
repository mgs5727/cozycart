<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CozyCart Market | User Signup</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-light">

  <!-- Header -->
  <header class="border-bottom bg-white">
    <div class="container py-3 d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div class="d-flex align-items-center gap-3">
        <!-- If you already have a logo file, replace src below with your logo path -->
        <img src="images/logo.png" alt="CozyCart Market Logo" class="site-logo" onerror="this.style.display='none'">
        <div>
          <div class="fs-4 fw-bold">CozyCart Market</div>
          <div class="text-muted small">Everyday essentials, cozy prices.</div>
        </div>
      </div>
      <div class="text-muted small">
        <div><span class="fw-semibold">Call Us:</span> (555) 123-4567</div>
        <div><span class="fw-semibold">Open:</span> Mon–Sat 9am–7pm</div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="border-top">
      <div class="container py-2 d-flex flex-wrap gap-3">
        <a class="navlink" href="index.html">Home</a>
        <a class="navlink" href="about.html">About</a>
        <a class="navlink" href="products.html">Products</a>
        <a class="navlink" href="deals.html">Deals</a>
        <a class="navlink" href="cart.html">Cart</a>
        <a class="navlink" href="contact.html">Contact</a>
        <a class="navlink active" href="signup.html">Sign Up</a>
      </div>
    </nav>
  </header>

  <!-- Main -->
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-3">User Signup</h1>

            <form id="signupForm" novalidate>
              <!-- Username -->
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  placeholder="Enter username"
                  onfocusout="validate(this)"
                />
                <div class="invalid-feedback" id="usernameError"></div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="joe@test.com"
                  onfocusout="validate(this)"
                />
                <div class="invalid-feedback" id="emailError"></div>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="Enter password"
                  onfocusout="validate(this)"
                />
                <div class="invalid-feedback" id="passwordError"></div>
              </div>

              <!-- Confirm Password -->
              <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="confirmPassword"
                  placeholder="Confirm password"
                  onfocusout="validate(this)"
                />
                <div class="invalid-feedback" id="confirmPasswordError"></div>
              </div>

              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Create Account</button>
                <a class="btn btn-outline-secondary" href="index.html">Back to Home</a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-top bg-white">
    <div class="container py-4 d-flex flex-column flex-md-row justify-content-between gap-2">
      <div class="text-muted small">© 2026 CozyCart Market. All Rights Reserved.</div>
      <div class="d-flex gap-3 small">
        <a class="footerlink" href="#">Terms of Use</a>
        <a class="footerlink" href="#">Cookie & Privacy Policy</a>
        <a class="footerlink" href="#">Support</a>
      </div>
    </div>
  </footer>

  <!-- JS Validation (internal per assignment) -->
  <script>
    // Email format: joe@test.com (basic but proper)
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    const form = document.getElementById("signupForm");

    // Reset red when user fixes input
    document.querySelectorAll("#signupForm .form-control").forEach(input => {
      input.addEventListener("input", () => validate(input));
    });

    // Validate all on submit
    form.addEventListener("submit", (e) => {
      const inputs = Array.from(document.querySelectorAll("#signupForm .form-control"));
      let allValid = true;

      inputs.forEach(inp => {
        if (!validate(inp)) allValid = false;
      });

      // Ensure match check runs even if user only touched one field
      if (!validate(document.getElementById("password"))) allValid = false;
      if (!validate(document.getElementById("confirmPassword"))) allValid = false;

      if (!allValid) {
        e.preventDefault();
        e.stopPropagation();
      }
    });

    function setInvalid(obj, message) {
      // Bootstrap invalid styling
      obj.classList.add("is-invalid");
      obj.classList.remove("is-valid");

      // Assignment requirement: make textbox text red via JS
      obj.style.color = "#FF0000";

      // Show message
      const err = document.getElementById(obj.id + "Error");
      if (err) err.textContent = message;

      return false;
    }

    function setValid(obj) {
      obj.classList.remove("is-invalid");
      obj.classList.add("is-valid");

      // Reset red color after valid input
      obj.style.color = "";

      const err = document.getElementById(obj.id + "Error");
      if (err) err.textContent = "";

      return true;
    }

    // Called by onfocusout="validate(this)"
    function validate(obj) {
      const id = obj.id;
      const val = (obj.value || "").trim();

      // All fields required
      if (val === "") {
        return setInvalid(obj, "This field is required.");
      }

      // Email format check
      if (id === "email") {
        if (!emailRegex.test(val)) {
          return setInvalid(obj, "Enter a valid email (example: joe@test.com).");
        }
      }

      // Password checks
      if (id === "password") {
        if (val.length < 6) {
          return setInvalid(obj, "Password must be at least 6 characters.");
        }
        // If confirm has something typed, re-check it
        const confirm = document.getElementById("confirmPassword");
        if (confirm.value.trim() !== "") validate(confirm);
      }

      // Confirm password must match password
      if (id === "confirmPassword") {
        const pw = document.getElementById("password").value.trim();
        if (val !== pw) {
          return setInvalid(obj, "Passwords do not match.");
        }
      }

      return setValid(obj);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
